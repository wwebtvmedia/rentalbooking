services:
  mongo:
    image: docker.io/library/mongo:4.4.18
    container_name: mongo
    restart: always
    volumes:
      - ${MONGO_DATA_DIR:-./data/mongo}:/data/db:z
    # Do not expose MongoDB on the host in production. Backend reaches it over the internal compose network.

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: backend
    restart: always
    environment:
      - SMTP_URL=smtp://mailpit:1025
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - mailpit

  mailpit:
    image: docker.io/axllent/mailpit
    container_name: mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
        NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-bestflats.vip}
        NEXT_PUBLIC_INSTAGRAM_URL: ${NEXT_PUBLIC_INSTAGRAM_URL:-https://www.instagram.com/}
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mcp-client:
    build:
      context: ./mcp-client
      dockerfile: Containerfile
    container_name: mcp-client
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  mongo_data:
